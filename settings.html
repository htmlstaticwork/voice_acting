<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | VoxTalent</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#4f46e5', dark: '#4338ca' },
                        secondary: { DEFAULT: '#0f172a', light: '#1e293b' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/global.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sidebar-link.active {
            background-color: rgba(79, 70, 229, 0.1);
            color: #4f46e5;
            border-right: 4px solid #4f46e5;
        }
        .dark .sidebar-link.active {
            background-color: rgba(79, 70, 229, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-black text-slate-900 dark:text-white transition-colors duration-300 overflow-hidden h-screen flex">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white dark:bg-slate-950 border-r border-slate-100 dark:border-slate-800 flex flex-col h-full z-50 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out">
        <div class="p-8 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-semibold font-display text-primary">
                <i data-lucide="mic-2" class="w-8 h-8"></i>
                <span>VoxTalent</span>
            </a>
            <button id="sidebar-close" class="lg:hidden p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        
        <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
            <p class="px-4 text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-4">Main Menu</p>
            <a href="dashboard.html" class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="projects.html" class="sidebar-link group flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all">
                <i data-lucide="briefcase" class="w-5 h-5"></i> My Projects
            </a>
            <a href="inbox.html" class="sidebar-link group flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all">
                <i data-lucide="message-square" class="w-5 h-5"></i> Inbox
                <span class="ml-auto bg-primary text-white text-[10px] px-2 py-0.5 rounded-full">3</span>
            </a>
            <a href="portfolio.html" class="sidebar-link group flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all">
                <i data-lucide="mic" class="w-5 h-5"></i> Portfolio
            </a>
            
            <p class="px-4 text-[10px] font-semibold text-slate-400 uppercase tracking-widest mt-8 mb-4">Finance</p>
            <a href="earnings.html" class="sidebar-link group flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all">
                <i data-lucide="wallet" class="w-5 h-5"></i> Earnings
            </a>
            <a href="invoices.html" class="sidebar-link group flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all">
                <i data-lucide="file-text" class="w-5 h-5"></i> Invoices
            </a>
            
            <p class="px-4 text-[10px] font-semibold text-slate-400 uppercase tracking-widest mt-8 mb-4">Account</p>
            <a href="settings.html" class="sidebar-link active flex items-center gap-4 px-4 py-3 rounded-xl font-semibold transition-all">
                <i data-lucide="settings" class="w-5 h-5"></i> Settings
            </a>
        </nav>
        
        <div class="p-6 border-t border-slate-100 dark:border-slate-800 lg:hidden">
            <p class="px-4 text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-4">Appearance</p>
            <div class="flex items-center gap-3 px-4">
                <button class="theme-toggle flex-1 flex items-center justify-center gap-2 p-3 bg-slate-50 dark:bg-slate-900 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all border border-slate-200 dark:border-slate-800">
                    <i data-lucide="moon" class="hidden dark:block w-4 h-4"></i>
                    <i data-lucide="sun" class="block dark:hidden w-4 h-4"></i>
                    <span class="text-xs font-semibold">Theme</span>
                </button>
                <button class="rtl-toggle flex-1 flex items-center justify-center gap-2 p-3 bg-slate-50 dark:bg-slate-900 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all border border-slate-200 dark:border-slate-800">
                    <i data-lucide="languages" class="w-4 h-4"></i>
                    <span class="text-xs font-semibold">RTL</span>
                </button>
            </div>
        </div>

        <div class="p-6 border-t border-slate-100 dark:border-slate-800">
            <a href="index.html" class="flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all">
                <i data-lucide="log-out" class="w-5 h-5"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Top Header -->
        <header class="h-20 bg-white dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between px-8 z-30">
            <div class="flex items-center gap-2 md:gap-4 min-w-0">
                <button id="sidebar-toggle" class="lg:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 shrink-0"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <h1 class="text-xs sm:text-base md:text-xl font-semibold font-display whitespace-nowrap truncate capitalize">Account Settings</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="hidden lg:flex items-center gap-2 border-r pr-6 dark:border-slate-800">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800" title="Toggle Theme">
                        <i data-lucide="moon" class="hidden dark:block w-5 h-5"></i>
                        <i data-lucide="sun" class="block dark:hidden w-5 h-5"></i>
                    </button>
                    <button id="rtl-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800" title="Toggle RTL">
                        <span class="rtl-hidden font-semibold text-sm px-1">RTL</span><span class="rtl-only font-semibold text-sm px-1">LTR</span>
                    </button>
                </div>
                <button class="relative p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full"></span>
                </button>
            </div>
        </header>
        
        <!-- Content -->
        <main class="flex-1 overflow-y-auto p-8 bg-slate-50 dark:bg-black">
            <div class="max-w-4xl mx-auto">
                <div class="mb-10 fade-in">
                    <h2 class="text-3xl font-semibold font-display mb-2">My <span class="text-primary italic">Profile</span></h2>
                    <p class="text-slate-500">Manage your personal information and preferences.</p>
                </div>

                <div class="space-y-8">
                    <!-- Profile Card -->
                    <div class="bg-white dark:bg-slate-950 rounded-[2.5rem] p-8 shadow-sm border border-slate-100 dark:border-slate-800 fade-in">
                         <div class="flex flex-col md:flex-row items-center gap-8 mb-10">
                              <div class="relative group">
                                  <img src="https://i.pravatar.cc/150?u=rivera" class="w-32 h-32 rounded-[2rem] object-cover ring-4 ring-slate-100 dark:ring-slate-800 transition-all group-hover:ring-primary">
                                  <button class="absolute -bottom-2 -right-2 bg-primary text-white p-3 rounded-2xl shadow-lg border-4 border-white dark:border-slate-900 hover:scale-105 active:scale-95 transition-all"><i data-lucide="camera" class="w-5 h-5"></i></button>
                              </div>
                              <div class="text-center md:text-left">
                                  <h3 class="text-2xl font-semibold font-display">Alex Rivera</h3>
                                  <p class="text-slate-500 mb-4">Professional Voice Artist • London, UK</p>
                                  <div class="flex flex-wrap gap-2 justify-center md:justify-start">
                                      <span class="px-3 py-1 bg-primary/10 text-primary text-[10px] font-semibold rounded-full uppercase">Pro Membership</span>
                                      <span class="px-3 py-1 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 text-[10px] font-semibold rounded-full uppercase">Verified Voice</span>
                                  </div>
                              </div>
                         </div>
                         <form class="space-y-6">
                              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                  <div class="space-y-2">
                                      <label class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                                      <input type="text" value="Alex Rivera" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all">
                                  </div>
                                  <div class="space-y-2">
                                      <label class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest ml-1">Professional Title</label>
                                      <input type="text" value="Professional Voice Artist" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all">
                                  </div>
                              </div>
                              <div class="space-y-2">
                                  <label class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest ml-1">Bio / Headline</label>
                                  <textarea rows="6" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-primary transition-all">Deep, energetic voice specialist with over 8 years of experience in cinematic trailers and corporate explainers.</textarea>
                              </div>
                              <div class="pt-6">
                                  <button class="bg-primary text-white w-full py-4 rounded-2xl font-semibold shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-95 transition-all">Save Changes</button>
                              </div>
                         </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"></div>

    <script src="assets/js/main.js"></script>
    <script>
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebarClose = document.getElementById('sidebar-close');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const body = document.body;
        
        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
            body.style.overflow = sidebar.classList.contains('-translate-x-full') ? '' : 'hidden';
        }

        if (sidebarToggle) sidebarToggle.addEventListener('click', toggleSidebar);
        if (sidebarClose) sidebarClose.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
