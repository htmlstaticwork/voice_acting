<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | VoxTalent</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#4f46e5', dark: '#4338ca' },
                        secondary: { DEFAULT: '#0f172a', light: '#1e293b' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/global.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white flex items-center justify-center min-h-screen p-4 transition-colors duration-300">
    <!-- Sign Up Card -->
    <div class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl p-8 md:p-12 relative fade-in">
        <!-- Card Controls -->
        <div class="flex justify-end w-full mb-4 -mt-4 gap-2">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" class="hidden dark:block w-5 h-5"></i>
                <i data-lucide="sun" class="block dark:hidden w-5 h-5"></i>
            </button>
            <button id="rtl-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="languages" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Brand Logo (links to home) -->
        <div class="flex flex-col items-center mb-10 text-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold font-display text-primary hover:opacity-80 transition-opacity mb-6">
                <i data-lucide="mic-2" class="w-7 h-7"></i>
                <span>VoxTalent</span>
            </a>
            <h1 class="text-2xl font-bold font-display dark:text-white transition-colors">Join VoxTalent</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 transition-colors">Start your journey with the world's best voice acting platform</p>
        </div>

        <!-- Form -->
        <form class="space-y-6">
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Full Name</label>
                    <input type="text" placeholder="John Doe" class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-primary text-slate-900 dark:text-white transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                    <input type="email" placeholder="john@example.com" class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-primary text-slate-900 dark:text-white transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative">
                        <input type="password" placeholder="Min. 8 characters" class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-primary text-slate-900 dark:text-white transition-all">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary"><i data-lucide="eye" class="w-5 h-5"></i></button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
                    <div class="relative">
                        <input type="password" placeholder="Re-enter password" class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-primary text-slate-900 dark:text-white transition-all">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary"><i data-lucide="eye" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>

            <div class="space-y-4 pt-2">
                <label class="flex items-start gap-3 cursor-pointer text-sm text-slate-600 dark:text-slate-400">
                    <input type="checkbox" class="mt-1 w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                    <span>I agree to the <a href="#" class="text-primary font-bold">Terms of Service</a> and <a href="#" class="text-primary font-bold">Privacy Policy</a>.</span>
                </label>
                <label class="flex items-start gap-3 cursor-pointer text-sm text-slate-600 dark:text-slate-400">
                    <input type="checkbox" class="mt-1 w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                    <span>Send me weekly industry tips and platform updates.</span>
                </label>
            </div>

            <button type="submit" class="w-full bg-primary text-white py-5 rounded-xl font-bold hover:bg-primary-dark transition-all transform hover:scale-105 active:scale-95 shadow-xl shadow-primary/20 hover:shadow-primary/40 mt-4">
                Sign Up
            </button>
        </form>

        <div class="relative flex items-center my-10">
            <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
            <span class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">or connect with</span>
            <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
        </div>

        <!-- Social SSO -->
        <div class="flex flex-col gap-3">
            <button class="flex items-center justify-center gap-3 py-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all font-bold text-sm dark:text-white transform hover:scale-105 hover:border-primary hover:shadow-xl dark:hover:shadow-primary/20 group">
                <img src="https://www.vectorlogo.zone/logos/google/google-icon.svg" class="w-5 h-5" alt="Google">
                Sign up with Google
            </button>
            <button class="flex items-center justify-center gap-3 py-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all font-bold text-sm dark:text-white transform hover:scale-105 hover:border-primary hover:shadow-xl dark:hover:shadow-primary/20 group">
                <img src="https://www.vectorlogo.zone/logos/apple/apple-icon.svg" class="w-5 h-5 dark:invert" alt="Apple">
                Sign up with Apple
            </button>
        </div>

        <p class="text-center mt-12 text-sm text-slate-500 whitespace-nowrap">
            Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Log In</a>
        </p>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
