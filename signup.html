<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Elena Rodriguez</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#4f46e5', dark: '#4338ca' },
                        secondary: { DEFAULT: '#0f172a', light: '#1e293b' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/global.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-black text-slate-900 dark:text-white flex items-center justify-center min-h-screen p-4 transition-colors duration-300">
    <!-- Card Controls (Fixed at top-right) -->
    <div class="fixed top-6 right-6 flex gap-2 z-50">
        <button id="theme-toggle" class="p-3 bg-white dark:bg-slate-900 rounded-full shadow-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-all transform hover:scale-110 active:scale-95 border border-slate-200 dark:border-slate-800">
            <i data-lucide="moon" class="hidden dark:block w-5 h-5"></i>
            <i data-lucide="sun" class="block dark:hidden w-5 h-5"></i>
        </button>
        <button id="rtl-toggle" class="p-3 bg-white dark:bg-slate-900 rounded-full shadow-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-all transform hover:scale-110 active:scale-95 border border-slate-200 dark:border-slate-800">
            <span class="rtl-hidden font-semibold text-xs px-1">RTL</span><span class="rtl-only font-semibold text-xs px-1">LTR</span>
        </button>
    </div>

    <!-- Sign Up Card -->
    <div class="w-full max-w-lg bg-white dark:bg-slate-950 rounded-[2.5rem] shadow-2xl p-8 md:p-12 relative fade-in">

        <!-- Brand Logo (links to home) -->
        <div class="flex flex-col items-center mb-10 text-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-semibold font-display text-primary hover:opacity-80 transition-opacity mb-6">
                <i data-lucide="mic-2" class="w-7 h-7"></i>
                <span>Elena Rodriguez</span>
            </a>
            <h1 class="text-2xl font-semibold font-display dark:text-white transition-colors">Join Elena Rodriguez</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 transition-colors">Start your journey with the world's best voice acting platform</p>
        </div>

        <!-- Social SSO -->
        <div class="flex flex-col gap-4">
            <p class="text-sm font-semibold text-slate-500 uppercase tracking-widest mb-2 text-center">Register with Social Account</p>
            <button class="flex items-center justify-center gap-3 py-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all font-semibold text-sm dark:text-white transform hover:scale-105 hover:border-primary hover:shadow-xl dark:hover:shadow-primary/20 group">
                <img src="https://www.vectorlogo.zone/logos/google/google-icon.svg" class="w-5 h-5" alt="Google">
                Sign up with Google
            </button>
            <button class="flex items-center justify-center gap-3 py-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all font-semibold text-sm dark:text-white transform hover:scale-105 hover:border-primary hover:shadow-xl dark:hover:shadow-primary/20 group">
                <img src="https://www.vectorlogo.zone/logos/apple/apple-icon.svg" class="w-5 h-5 dark:invert" alt="Apple">
                Sign up with Apple
            </button>
        </div>

        <p class="text-center mt-12 text-sm text-slate-500 whitespace-nowrap">
            Already have an account? <a href="login.html" class="text-primary font-semibold hover:underline">Log In</a>
        </p>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
